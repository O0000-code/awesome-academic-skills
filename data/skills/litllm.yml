description: RAG-based literature-review assistant (TMLR 2025) that drafts structured
  related-work sections from a paper set, as a web app or Claude Code skill. Strong
  for related-work synthesis; narrow (related-work, not full-paper) and demo-hosted.
description_zh: 基于 RAG 的文献综述助手（TMLR 2025），从给定论文集起草结构化的 related-work 章节，可作为 web app
  或 Claude Code skill 使用。在 related-work 综合上很强；但定位窄（只做 related-work，非整篇论文）且以 demo 形式托管。
