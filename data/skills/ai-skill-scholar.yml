  depends_3rdparty: false
  allowed_tools_scoped: true
homepage_url: null
install: npx skills add dsebastien/ai-skill-scholar --skill "*"  (or copy skills/*
  into ~/.claude/skills/)
validate_claim: 'Ask: "Find high-citation papers on mechanistic interpretability from
  ICLR and NeurIPS, then show what 2501.11120 cites." Confirm scholar-search returns
  citation-counted hits and scholar-citations walks the reference graph — no API key
  prompted.'
