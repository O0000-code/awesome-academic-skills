description: Three composable OpenAlex skills (venue search, citation-graph walk,
  review orchestrator) — stdlib-only, no pip, no key.
description_zh: 三个可组合的 OpenAlex 技能（会议检索、引用图游走、综述编排）——纯标准库，免 pip、免 key。
description_long: Three composable OpenAlex skills — venue search, a citation-graph
  walker, and a pause/resume two-pass review orchestrator. Stdlib Python, no pip,
  no API key; picks OpenAlex over Semantic Scholar so it just works. Pairs with the
  author's arXiv skills.
description_zh_long: 三个可组合的 OpenAlex 技能：按会议/期刊检索、沿引用图游走、外加一个可暂停/续跑的两遍式综述编排器。 纯标准库
  Python，免 pip、免 API key，选 OpenAlex 而非 Semantic Scholar，所以开箱即用。 与作者另一套 arXiv 技能搭配更顺手。
security:
  makes_network_calls: true
  network_endpoints:
