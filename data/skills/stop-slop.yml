description_long: The most-starred de-slop skill — a terse, dogmatic 8-rule rulebook
  (kill adverbs, no em dashes, no "not X but Y" contrasts) plus a 50-point scoring
  rubric. General-purpose for prose; not academic-specific and does not address false
  positives.
