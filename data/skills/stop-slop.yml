spotlight_rationale: 'The most-starred de-slop skill, and refreshingly opinionated:
  a terse eight-rule rulebook (kill adverbs, drop em-dashes, no not-X-but-Y) plus
  a 50-point scoring rubric. It is general-purpose rather than academic-specific and
  will not flag its own false positives — but as a fast first pass to strip the AI
  tells out of a draft before a human edit, nothing else is this direct.'
spotlight_rationale_zh: star 数最高的去 AI 味技能，且观点鲜明得令人耳目一新：一本简短的八条规则手册（删副词、去破折号、不用 not-X-but-Y），外加
  50 分制评分量表。它面向通用散文而非专为学术，也不会标出自己的误报——但若只把它当作人工精修前的"快速第一遍"，把草稿里的 AI 痕迹先刮掉一层，没有谁比它更直接利落。
