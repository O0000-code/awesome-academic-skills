validate_claim: 'Paste an AI-sounding paragraph (em dashes, ''not just X — it''s Y'',
  tricolons) and ask: ''Use stop-slop to rewrite this and score it.'' Expect a rewrite
  with the tells removed and a 1-10 rating per dimension.'
