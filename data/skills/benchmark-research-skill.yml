description: Extracts benchmarks, datasets, metrics and baselines from a paper, or
  surveys what benchmarks fit a research direction; arXiv-source-first with Obsidian
  notes. Uses an unscoped Bash(*) allowlist — broad shell access.
description_zh: 从论文中提取 benchmark、数据集、指标与 baseline，或调研哪些 benchmark 契合某个研究方向；优先用 arXiv
  源、配 Obsidian 笔记。使用未加限定的 Bash(*) 白名单——shell 权限范围很宽。
