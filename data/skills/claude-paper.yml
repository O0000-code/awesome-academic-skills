license: MIT
category: Reading, Summarization & Q&A
lifecycle_stage: reading
type: plugin
description: 'Paper-study plugin that turns a PDF or arXiv link into a learning environment:
  parsed text, adaptive summaries/Q&A, runnable code demos and a KaTeX web viewer.
  Rich but heavy (Node/Nuxt/poppler deps); uses an unscoped Bash allowlist.'
description_zh: 一个论文研读 plugin，把 PDF 或 arXiv 链接变成学习环境：解析文本、自适应摘要/问答、可运行的代码示例，以及一个 KaTeX
  网页阅读器。功能丰富但偏重（依赖 Node/Nuxt/poppler）；使用了未加限定的 Bash 白名单。
security:
  makes_network_calls: true
  network_endpoints:
  - '...'
