  - dotenvx.com
  - feross.org
  - katex.org
  - nodejs.org
  - nuxt.com
  - opencollective.com
  - paulmillr.com
  - registry.npmjs.org
  - tidelift.com
  - www.patreon.com
  has_hooks: true
  requires_bypass_permissions: false
  telemetry: false
  auto_update: false
