description: Formats Chinese academic references to GB/T 7714 and completes BibTeX
  from Chinese/English titles. Fills a real gap for CN scholars that Western citation
  tools ignore. Narrow by design; bundles helper scripts and an agent.
description_zh: 将中文学术参考文献格式化为 GB/T 7714 标准，并依据中英文标题补全 BibTeX 条目。填补了西方引用工具忽视的中文学者真实需求空白。定位本就专一；附带辅助脚本和一个
  agent。
