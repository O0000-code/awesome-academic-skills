description: A journal-first manuscript pipeline for Nature-style submissions — citation-integrity,
  claim/evidence discipline, submission preflight and rebuttal. Opinionated and narrow
  by design; strong for high-end bio/medical writing.
description_zh: 一条以期刊为先、面向 Nature 风格投稿的稿件流水线——引用完整性、论点/证据的严格把控、投稿前预检与反驳回应。主张鲜明、定位有意收窄；对高端生物/医学写作很有优势。
