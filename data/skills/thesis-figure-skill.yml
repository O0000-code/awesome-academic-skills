description: 'Turns paper text into publication-grade figures: LaTeX/TikZ (pixel-precise,
  embeddable) or draw.io XML (route maps, slides). Targets high density + one-pass
  compile; bilingual. Best for structured CS/ML schematics, not data-driven statistical
  plots.'
description_zh: 把论文文字转成可发表质量的图：LaTeX/TikZ（像素级精确、可嵌入）或 draw.io XML（路线图、幻灯片）。追求高信息密度
  + 一次编译通过；支持双语。最适合结构化的 CS/ML 示意图，而非数据驱动的统计图。
