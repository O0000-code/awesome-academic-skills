install: npx skills add lingzhi227/agent-research-skills -g -a claude-code (global;
  then run install.sh for slash commands)
validate_claim: Ask the data-analysis skill to run a t-test and report effect size
  on a small CSV; confirm it uses numpy/scipy correctly and states assumptions rather
  than inventing a p-value.
