description_long: 31 skills across the full paper lifecycle — literature search, data
  analysis with NumPy/SciPy stats, self-review, deep-research, slides — distilled
  from 17 LLM-agent repos. Useful breadth, but unlicensed and rough-edged (a broken
  link in its README).
description_zh_long: 31 个覆盖论文全生命周期的 skill——文献检索、用 NumPy/SciPy 做统计分析、自我审稿、深度研究、幻灯片——提炼自
  17 个 LLM agent 仓库。广度实用，但未附许可证，且略显粗糙（README 里有一个失效链接）。
