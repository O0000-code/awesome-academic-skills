description_zh: 一款懂科研的去 AI 味技能，对 Methods 被动语态等学科惯例网开一面——嫌 stop-slop 太"博客腔"时就选它。
description_long: A science-aware de-slop skill from a bioinformatician — its four
  catalogs target manuscripts, abstracts, cover letters, and referee responses, and
  it spares conventions like passive voice in Methods. The pick when stop-slop feels
  too blog-flavored.
description_zh_long: 一款懂科研的去 AI 味技能，出自一位生物信息学者之手——四套清单分别针对论文、摘要、cover letter 与审稿回复，并对
  Methods 中的被动语态等学科惯例网开一面。当你嫌 stop-slop 太"博客腔"时，就选它。
