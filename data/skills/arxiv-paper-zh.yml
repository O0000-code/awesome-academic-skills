description: Translates arXiv LaTeX papers into Chinese while preserving formatting (formulas, figures,
  citations), from an arXiv ID or local source. The format-preserving approach beats plain-text translation;
  scope is narrow (arXiv LaTeX, EN to zh).
description_zh: 将 arXiv 的 LaTeX 论文翻译成中文，并保留格式——公式、图表与引用——可从 arXiv ID 或本地源文件读取。这种保留格式的方式优于纯文本翻译；适用范围较窄（仅限
  arXiv LaTeX、英译中）。
