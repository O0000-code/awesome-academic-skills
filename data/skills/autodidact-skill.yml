description: 'Autonomous topic-to-wiki research agent extending Karpathy''s LLM-Wiki:
  auto-fetches web sources, compiles an interlinked wiki, and self-audits coverage
  gaps each round. Good for unattended literature scaffolding; not a verified-citation
  tool.'
description_zh: 在 Karpathy 的 LLM-Wiki 基础上扩展的自主"主题转 wiki"研究 agent：自动抓取网络来源，编纂出相互链接的
  wiki，并在每一轮自查覆盖盲区。适合无人值守地搭建文献框架；但不是用于核验引用的工具。
