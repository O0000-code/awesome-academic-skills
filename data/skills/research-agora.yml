description: Suite for ML researchers spanning literature search, paper writing, citation verification,
  experiment tracking, LaTeX automation, benchmarking, and peer review. The experiment-tracking and benchmark
  angle is its edge; breadth means moderate depth.
description_zh: 面向 ML 研究者的套件，覆盖文献检索、论文写作、引用核验、实验追踪、LaTeX 自动化、基准测试与同行评审。实验追踪与基准测试这一切入点是它的长处；覆盖面广也意味着各项深度只属中等。
