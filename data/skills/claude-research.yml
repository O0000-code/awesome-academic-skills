description: 'PhD-researcher infrastructure: 50 skills plus agents, hooks and rules
  for bibliography validation, LaTeX health-checks, experiment and causal design,
  and reproducible project setup. Strong end-to-end; ships hooks and an unscoped Bash.'
description_zh: 面向博士研究者的基础设施：50 个 skill，外加 agent、hook 与规则，用于参考文献校验、LaTeX 健康检查、实验与因果设计，以及可复现的项目搭建。端到端能力很强；附带
  hook 和一个未限定范围的 Bash。
