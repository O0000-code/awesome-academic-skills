description: Reads STEM papers through Heilmeier's Catechism, surfacing the core problem,
  approach, cost and impact for a fast big-picture take. A focused, opinionated comprehension
  aid; great for triaging papers, less so for deep line-by-line reading.
description_zh: 以 Heilmeier 问题清单（Heilmeier's Catechism）的视角阅读 STEM 论文，提炼核心问题、方法、成本与影响，快速形成全局把握。一个聚焦而有主见的理解辅助工具；很适合对论文做初筛分流，但不擅长逐行深读。
