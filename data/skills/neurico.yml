description: Give it a structured hypothesis; it runs the experiment loop and emits
  code, figures, and a LaTeX paper. Lab-built and genuinely scholarly, though heavy
  (git+docker) and only as good as the domain harness behind it.
description_zh: 给它一个结构化假设，它就跑完实验循环，并产出代码、图表和一篇 LaTeX 论文。由实验室打造、确有学术性，但偏重（需 git+docker），其上限取决于背后的领域测评框架。
