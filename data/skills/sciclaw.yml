description: A 'pair-scientist' research suite (23 skills) wrapped in a lightweight
  Go runtime that injects lifecycle hooks, a manuscript spine and run-logging so every
  session is reproducible, logged and citeable.
description_zh: 一套"结对科学家"式的研究套件（23 个 skill），封装在轻量的 Go runtime 中，注入生命周期 hook、稿件主干结构与运行日志，使每次会话都可复现、有记录、可引用。
