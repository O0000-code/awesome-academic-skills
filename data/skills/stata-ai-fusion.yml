description: Lets an agent drive a real Stata session (run commands, inspect data,
  extract estimation results, capture graphs) via an MCP server plus a Stata skill
  knowledge base. Fills the AI-Stata gap for econ/epi/biostat; requires a licensed
  Stata install.
description_zh: 让 agent 通过一个 MCP server 加一份 Stata skill 知识库，驱动一个真实的 Stata 会话：运行命令、查看数据、提取估计结果、抓取图形。为经济学/流行病学/生物统计填补了
  AI 与 Stata 之间的空缺；需要已授权的 Stata 安装。
