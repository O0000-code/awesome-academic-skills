description: 'Chinese CS-PhD-dissertation polisher: batch-reads 120+ page theses,
  strips AI-writing markers, enforces academic-norm checks (first-person residue,
  figure/ref formatting) and chapter consistency. For formal academic prose, not casual
  humanizing.'
description_zh: 面向中文计算机博士学位论文的润色工具：批量通读 120 页以上的论文，清除 AI 写作痕迹，执行学术规范检查（残留的第一人称、图表/参考文献格式）并核对章节一致性。面向正式的学术文本，而非随意的口语化“去
  AI 味”。
