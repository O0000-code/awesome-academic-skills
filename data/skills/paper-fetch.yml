name: paper-fetch
slug: paper-fetch
source_url: https://github.com/agents365-ai/paper-fetch
author: agents365-ai
author_url: https://github.com/agents365-ai
license: MIT
category: Literature Search & Discovery
lifecycle_stage: discovery
type: skill
description: Resolves a DOI (or batch) to a downloadable PDF via a 7-source fallback
  chain (Unpaywall, Semantic Scholar, arXiv, PMC, bioRxiv, publisher, then Sci-Hub)
  with per-source reporting. Clean and zero-deps; the Sci-Hub fallback is a caveat.
description_zh: 通过一条 7 源兜底链（Unpaywall、Semantic Scholar、arXiv、PMC、bioRxiv、出版商，最后才是
  Sci-Hub）把一个（或一批）DOI 解析为可下载的 PDF，并逐源报告结果。干净、零依赖；Sci-Hub 兜底是一处需注意的隐患。
