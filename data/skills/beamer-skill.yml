description: 'The strongest pick for academic LaTeX slides, with opinionated pedagogy:
  no overlays, density caps, visual overflow detection.'
description_zh: 学术 LaTeX 幻灯片的首选，带着鲜明的排版主张：不用逐步显现动画、设密度上限、靠视觉审查检测溢出。
description_long: 'Turns agents into competent Beamer authors with opinionated pedagogy:
  no overlays, per-slide density caps, 3-pass XeLaTeX compile, box-overflow detection
  via visual audit, WCAG-AA colorblind-safe palette. The strongest pick for academic
  LaTeX slides.'
description_zh_long: 把 agent 训练成称职的 Beamer 作者，并带着一套鲜明的排版主张：不用逐步显现动画、每页设密度上限、XeLaTeX
  三遍编译、靠视觉审查检测文本框溢出、采用符合 WCAG-AA 的色盲友好配色。学术 LaTeX 幻灯片的首选。
