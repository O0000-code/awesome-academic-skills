  with human approval. Strong for structured manuscript review; not a from-scratch
  writer.
description_zh: 一个 Claude Code 插件，让 12 个专项 agent（逻辑、技术、文笔、参考文献、LaTeX 等评审角色）并行审阅同一份草稿，先诊断问题、再在人工确认后修改。擅长结构化的稿件评审；并非从零起草的写作工具。
