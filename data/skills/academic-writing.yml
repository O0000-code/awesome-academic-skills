description: Multi-agent writing system that decomposes an empirical thesis into per-section
  skills (intro, methods, results, discussion, abstract) plus literature review, analysis,
  and submission. The section-level structure is its strength; nominally econ.
description_zh: 多 agent 写作系统，将一篇实证论文拆解为各章节专属的 skill（引言、方法、结果、讨论、摘要），外加文献综述、分析与投稿环节。章节级的结构划分是其强项；名义上面向经济学。
