type: suite
description: LaTeX typesetting suite that compiles, renders pages to images, then
  visually diagnoses and fixes layout problems (overfull boxes, float placement, spacing,
  tables). The vision-in-the-loop loop is its real edge; needs a working local LaTeX
  toolchain.
description_zh: LaTeX 排版套件，先编译、把页面渲染为图像，再以视觉方式诊断并修复版式问题（overfull box、浮动体摆放、间距、表格）。其真正的优势在于“视觉闭环”；需要一套可用的本地
  LaTeX 工具链。
