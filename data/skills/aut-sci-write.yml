description: 'Modular research-lifecycle suite: literature search across arXiv/PubMed/Web
  of Science, PDF and figure extraction, review/meta-analysis writing, Zotero sync
  and slides. Broad and well-adopted; a do-everything suite, not a best-in-one-stage
  tool.'
description_zh: 一个覆盖研究全生命周期的模块化 skill 集：跨 arXiv/PubMed/Web of Science 文献检索、PDF 与图表提取、综述/meta
  分析写作、Zotero 同步以及幻灯片制作。覆盖面广、采用率高；属于“样样都能做”的大而全 skill 集，而非某一环节做到最好的专精工具。
