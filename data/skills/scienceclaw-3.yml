description: End-to-end research suite (275 skills, 9 agents, 77 databases) spanning
  literature search to publication. Ambitious breadth in one repo, but quality is
  uneven and it ships a chat-bot channel, hooks and a tools wildcard worth reviewing.
description_zh: 端到端研究套件（275 个 skill、9 个 agent、77 个数据库），覆盖文献检索到发表。单一仓库内野心勃勃、覆盖面极广，但质量参差，且附带一个聊天机器人通道、hook
  与一个 tools 通配符，值得先行审查。
