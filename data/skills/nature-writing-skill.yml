description: Nature-family (NMI/NC/NCS/Nature) paper-writing craft for Chinese AI/ML
  researchers, built from sentence-level extraction of 44 open-access papers with
  a grep-traceable corpus and a sister figure skill. Niche to Nature-style AI methods
  papers.
description_zh: 面向中国 AI/ML 研究者的 Nature 系（NMI/NC/NCS/Nature）论文写作技艺，基于对 44 篇开放获取论文的句子级抽取构建，配有可
  grep 溯源的语料库和一个配套的图表 skill。聚焦于 Nature 风格的 AI 方法类论文这一细分场景。
