description: A systematic-literature-review scaffold following the PRISMA 2020 framework
  (protocol, search, screening, flow diagram, synthesis). Solid methodology for rigorous
  reviews; process-guidance rather than automated search, and its license is unclear.
description_zh: 按 PRISMA 2020 框架（方案、检索、筛选、流程图、综合）引导你完成一次系统文献综述。是严谨综述的扎实方法学脚手架；提供的是流程指引而非自动检索，且其
  license 尚不明确。
