description: 'Roleplays the worst-case adversarial peer reviewer: an inflated wall
  of weaknesses, framework attacks, a score fixed at reject, and a rebuttal phase
  conceding nothing. Half polemic on LLM reviews, half a pre-submission stress test;
  not a gentle tool.'
description_zh: 扮演最坏情况下的对抗式审稿人：堆砌夸大的“缺点墙”、攻击研究框架、把分数钉死在 reject，并在 rebuttal 阶段寸步不让。一半是对
  LLM 审稿的讽喻，一半是真正的投稿前压力测试；并非一个温和的工具。
