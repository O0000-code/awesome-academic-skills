description: Turns a natural-language research.md goal into a Karpathy-style experiment-evaluate-iterate
  loop, generalized beyond ML to any task with a mechanical evaluator, with auto rollback,
  audit trail, safety budgets. Domain-general; thin on literature work.
description_zh: 把自然语言写的 research.md 目标转化为 Karpathy 式的「实验—评估—迭代」循环，并从 ML 推广到任何有机械化评估器的任务，配有自动回滚、审计轨迹与安全预算。领域通用；文献能力有限。
