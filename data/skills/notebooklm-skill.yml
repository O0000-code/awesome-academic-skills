description: Drives Google NotebookLM from Claude for cited answers and free artifacts
  (podcast, mind map, study guide) — an unofficial cookie-based client that can break.
description_zh: 从 Claude 里驱动 Google NotebookLM，产出带引用的答案和免费产物（播客、思维导图、学习指南）。要注意：靠 cookie
  的非官方客户端，随时可能失效。
description_long: 'Drives Google NotebookLM from Claude to turn your sources into
  cited answers and free artifacts — podcast, mind map, study guide, slides — while
  Claude writes prose. Caveat: an unofficial client on stored Google cookies, so it
  can break.'
description_zh_long: 从 Claude 里驱动 Google NotebookLM，把你的资料变成带引用的答案和免费产物——播客、思维导图、学习指南、幻灯片——同时由
  Claude 来写文字。要注意：它是个靠存储的 Google cookie 工作的非官方客户端，随时可能失效。
security:
  makes_network_calls: true
  network_endpoints:
  - notebooklm.google.com / Google account endpoints (via notebooklm-py)
  has_hooks: false
  requires_bypass_permissions: false
  telemetry: false
  auto_update: false
  depends_3rdparty: true
  allowed_tools_scoped: true
homepage_url: https://github.com/claude-world/notebooklm-skill
install: pip install notebooklm-skill ; python3 -m notebooklm login (one-time browser
  auth)
validate_claim: Ingest two PDFs, ask a cross-source question, and confirm the answer
  is cited; then generate a study guide or audio overview artifact.
