description_long: Two-phase deep-research skill — outline first, then deep investigation
  — with AskUserQuestion gates so you approve the framework and time window before
  any search runs. The human-in-the-loop counterweight to fire-and-forget agents.
  EN/ZH.
description_zh_long: 两段式深度研究技能——先出提纲，再深入调查——并用 AskUserQuestion 设卡，让你在任何检索动手之前先敲定框架和时间窗。是对那些"一键放飞、不再过问"型代理的人在环路制衡。中英双语。
