description: Markdown to PDF with no LaTeX; its real edge is CJK rendering where Pandoc
  and wkhtmltopdf break.
description_zh: 无需 LaTeX 的 Markdown 转 PDF；真正的过人之处在中日韩文渲染，能正常处理 Pandoc 与 wkhtmltopdf
  翻车之处。
description_long: 'Markdown to publication-quality PDF with one Python file and one
  dependency (reportlab) — no LaTeX, no 4GB TeX. Its real edge is CJK: mixed Chinese/Latin
  wrapping and fonts that render where Pandoc and wkhtmltopdf break. Interactive,
  not a bare CLI.'
description_zh_long: 用一个 Python 文件、一个依赖（reportlab）把 Markdown 转成可发表质量的 PDF——不用 LaTeX，也省去
  4GB 的 TeX。真正的过人之处在中日韩文：中英混排的断行与字体，在 Pandoc 和 wkhtmltopdf 翻车的地方它能正常渲染。交互式使用，而非纯命令行。
