description: Applies a unified, anti-sycophantic evidence methodology - ICD 203, GRADE,
  PRISMA, Cochrane RoB and others - as a 14-step appraisal for systematic reviews,
  evidence grading and claim verification. Rigorous; ships hooks.
description_zh: 将一套统一的、反“随声附和”的证据方法论（ICD 203、GRADE、PRISMA、Cochrane RoB 等）落实为 14 步评估流程，用于系统综述、证据分级与论断核验。严谨；附带
  hook。
