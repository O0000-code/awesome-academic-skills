description: Applies Tufte's data-viz principles (high data-ink ratio, no chartjunk,
  no pie charts) across six charting libraries plus accessibility rules. Excellent
  for clean, honest charts; deliberately opinionated, so it overrides styling choices.
description_zh: 在六种绘图库上贯彻 Tufte 的数据可视化原则（高 data-ink 比、不要 chartjunk、不用饼图），并附带可访问性规则。做干净、诚实的图表极佳；刻意地立场鲜明，因而会覆盖你的样式选择。
