description_long: A strategist-then-composer pipeline for philosophy and interdisciplinary
  papers targeting preprint venues (PhilArchive, PhilSci, PsyArXiv), with citation-backed
  gap analysis and a 35-point reviewer simulation. Rare humanities focus; now unmaintained.
