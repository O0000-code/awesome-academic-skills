description: 'Autonomous research agent: turns a topic into a full draft paper via
  four budget-capped loops (deep-search, experiment, improvement, review) with CrossRef
  citation recovery and a multi-model review gate.'
description_zh: 自主研究 agent：通过四个有预算上限的循环（深度检索、实验、改进、评审）把一个选题变成完整的论文初稿，配 CrossRef 引用补全和多模型评审关卡。强大且模块化（含
  87+ 研究技能）。
