description: Drafts each paragraph by Claude/Codex/Gemini consensus, betting three-model-approved text
  also satisfies LLM reviewers — needs all three CLIs.
description_zh: 让 Claude、Codex、Gemini 三方共识起草每个段落，赌三模型认可的文字也能让 LLM 审稿人满意——需同时装好三个 CLI。
description_long: Drafts each paragraph by making Claude, Codex, and Gemini independently write, cross-review,
  and argue to consensus — betting text three models approve of will also satisfy LLM reviewers. Strong
  for code-to-paper writeups; needs all three CLIs.
description_zh_long: 让 Claude、Codex、Gemini 各自独立起草每个段落，再交叉评审、争辩到达成共识——赌的是三个模型都认可的文字也能让 LLM 审稿人满意。尤其适合把代码写成论文；需同时装好三个
  CLI。
