description_long: Bioinformatics pack teaching agents idiomatic code for the real
  toolchain — samtools/bcftools/BLAST, DESeq2/edgeR/Seurat, single-cell RNA-seq, variant
  calling — and reports its scores on the authors' Bio-Task Bench. The most benchmark-honest
  pack.
description_zh_long: 生物信息学套件，教 agent 为真实工具链写地道的代码——samtools/bcftools/BLAST、DESeq2/edgeR/Seurat、单细胞
  RNA-seq、变异检测——并公布了它在作者自建的 Bio-Task Bench 上的成绩。基准测试最坦诚的一个套件。
