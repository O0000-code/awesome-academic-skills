description: Turns a thesis or paper into ready-to-present academic Beamer slides
  with a real layout library and an interactive editing loop. Bilingual, no LaTeX
  expertise required; scope is defense/conference decks, not general slide design.
description_zh: 将学位论文或期刊论文转化为可直接演示的学术 Beamer 幻灯片，配有实用的版式库与交互式编辑循环。支持双语，无需 LaTeX 专业知识；适用范围是答辩/会议演示，而非通用幻灯片设计。
