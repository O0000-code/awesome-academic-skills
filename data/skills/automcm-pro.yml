description: 'End-to-end math-modeling-competition assistant (CUMCM/MCM): drives literature
  search, derivation, code, LaTeX and paper writing with forced code self-verification.
  Strong for modeling contests; competition-specific and Chinese-first.'
description_zh: 端到端的数学建模竞赛助手（CUMCM/MCM）：贯通文献检索、推导、代码、LaTeX 与论文写作，并强制进行代码自我验证。在建模竞赛场景下很强；专为竞赛设计、以中文为先。
security:
  makes_network_calls: true
  network_endpoints:
  - doi.org
  - download.pytorch.org
  - keepachangelog.com
  - miktex.org
  - platform.openai.com
  - semver.org
  - tug.org
  has_hooks: false
  requires_bypass_permissions: false
  telemetry: false
  auto_update: false
  depends_3rdparty: false
  allowed_tools_scoped: true
validate_claim: Give the system a concrete research question and verify it returns
  a searched, cited, and drafted result whose sources actually exist.
