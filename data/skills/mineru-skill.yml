description: Parses PDFs, Office docs and images into clean Markdown with LaTeX formulas,
  tables and OCR via MinerU. A solid OCR/extraction entry point for getting papers
  into editable text.
description_zh: 借助 MinerU 将 PDF、Office 文档和图片解析为干净的 Markdown，保留 LaTeX 公式、表格并支持 OCR。是把论文转为可编辑文本的扎实
  OCR/提取入口；但依赖 MinerU，且只是若干 PDF 转 MD skill 之一，宜对比后再选。
