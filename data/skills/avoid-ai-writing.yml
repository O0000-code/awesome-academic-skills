description_zh: 最诚实的去 AI 化技能——它引用误报研究，坚持自己的标记"只是信号，不是证据"。
description_long: The most intellectually honest de-AI skill — detect, rewrite, and
  iterate modes plus voice profiles, but it opens by citing the false-positive research
  and insists its flags are "signals, not proof". Best when AI-detection carries real
  stakes.
description_zh_long: 最诚实的去 AI 化技能——具备检测、改写、迭代三种模式与多套语气画像，但它开篇就引用误报研究，并坚持自己的标记"只是信号，不是证据"。当
  AI 检测真会带来后果时，它最值得用。
