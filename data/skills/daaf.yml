description: Instruction framework making Claude Code behave like a rigorous, reproducible
  quantitative researcher in any domain, with auditable steps, guardrails, and human-in-the-loop
  verification. Heavyweight and opinionated; core decisions stay with the user.
description_zh: 一套指令框架，让 Claude Code 在任何领域都表现得像一名严谨、可复现的定量研究者：可审计的步骤、护栏，以及人在回路（human-in-the-loop）的核验。重量级且观点鲜明；每个核心决策都由用户把舵。
