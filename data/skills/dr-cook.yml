description: Modular research-lifecycle suite (literature, gap analysis, writing,
  peer review, bioinformatics, grants) with a routing layer and depth in Traditional
  Chinese Medicine. Strong for TCM/biomed; modest adoption, do-everything breadth.
description_zh: 模块化的研究全生命周期套件（文献、空白分析、写作、同行评审、生物信息学、基金申请），带路由层，并在中医药领域有深度积累。在中医/生物医学场景下很强；采用度一般，主打面面俱到的广度。
