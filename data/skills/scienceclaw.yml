description: 'Large self-evolving research-agent platform (OpenClaw-based): 285 skills
  across 28+ disciplines, persistent memory, API-grounded citations. Popular for end-to-end
  research agents; bundles a full messaging/browser/sandbox OS, so read before trusting.'
description_zh: 一个大型自演化研究 agent 平台（基于 OpenClaw）：横跨 28+ 个学科的 285 个 skill，配有持久化记忆和以
  API 为依据的引用。在端到端研究 agent 领域颇受欢迎；但内置了一整套消息/浏览器/沙箱式的“操作系统”，使用前务必先读懂再信任。
