description: Turns YouTube/Bilibili lecture videos into structured LaTeX/PDF notes
  via transcript extraction, key-frame detection, and smart-cropped screenshots. Novel
  and useful for students; quality depends on transcript availability, and the license
  is murky.
description_zh: 通过字幕提取、关键帧检测与智能裁剪截图，把 YouTube/Bilibili 的讲座视频转成结构化的 LaTeX/PDF 笔记。对学生既新颖又实用；质量取决于字幕是否可得，许可证情况也存疑。
