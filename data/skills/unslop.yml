type: plugin
description: De-AI plugin that strips AI-isms (sycophancy, stock phrases, hedging,
  em-dash pileups) while preserving code, URLs and headings, with a benchmarked detector.
  Strong general-prose humanizer; not academic-specific, needs tuning to keep technical
  voice.
description_zh: 一个去 AI 痕迹的 plugin，剔除各类 AI 腔（谄媚口吻、套话、模棱两可的措辞、em-dash 堆砌），同时保留代码、URL
  与标题，并配有经过基准测试的检测器。通用文字的"去 AI 化"很强；但不针对学术场景，需调校才能保住技术性语气。
