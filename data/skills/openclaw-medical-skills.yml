  has_hooks: false
  requires_bypass_permissions: false
  telemetry: false
  auto_update: false
  depends_3rdparty: false
  allowed_tools_scoped: true
install: Clone and point your agent at the skills/ directory (see repo README)
validate_claim: Ask a skill in the clinical-trials area to match a patient profile
  to eligible trials; confirm it reasons over real inclusion/exclusion criteria rather
  than fabricating trial IDs.
