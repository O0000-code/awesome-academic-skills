description_zh: 最大的开放医学研究 skill 库（数百个 skill）——覆盖很广，但体量巨大、无法逐一审查、且无许可证。
description_long: The largest open medical-research skill library (hundreds of skills)
  from the FreedomIntelligence lab — clinical-trial matching, GEO/genomics access,
  reporting-guideline and biomedical workflows. Broad coverage, but giant, unauditable,
  no license.
description_zh_long: 出自 FreedomIntelligence 实验室、最大的开放医学研究 skill 库（数百个 skill）——临床试验匹配、GEO/基因组数据获取、报告规范及生物医学工作流。覆盖很广，但体量巨大、无法逐一审查、且无许可证。
