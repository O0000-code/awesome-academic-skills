  - figshare.com
  - web.archive.org
  - www.retardmaxx.com
  - x.com
  has_hooks: false
  requires_bypass_permissions: false
  telemetry: false
  auto_update: false
  depends_3rdparty: false
  allowed_tools_scoped: false
