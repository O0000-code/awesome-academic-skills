description: 'LLM-compiled knowledge bases for agents: parallel multi-agent research,
  thesis-driven investigation, source ingestion, then a queryable wiki. Good for building
  a durable, cited knowledge base from many sources.'
description_zh: 为 agent 构建 LLM 编译的知识库：并行多 agent 调研、论点驱动的探查、来源摄入，最终形成可查询的 wiki。适合从大量来源搭建持久、带引用的知识库，属于研究综合工具，而非文献检索工具。
