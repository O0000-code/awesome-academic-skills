description: 'Portable skill pack implementing Google''s PaperOrchestra: turns agent
  experiment logs into idea+log inputs, then outline→writing→refinement→plotting with
  autoraters to a LaTeX paper. Best when experiments already exist, not literature-first.'
description_zh: 一个可移植的 skill 包，实现 Google 的 PaperOrchestra：把 agent 的实验日志转化为“想法+日志”输入，再经由提纲→写作→精修→绘图、配合
  autorater 产出一篇 LaTeX 论文。最适合你已有实验数据的情形，而非以文献为起点。
