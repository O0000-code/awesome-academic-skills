description: Turns a student project (source code, database, screenshots, references)
  into a traceable, resumable, reviewable undergraduate thesis following a university
  template and sample-paper style. Great for CN capstones; not a general academic-writing
  tool.
description_zh: 把学生的项目（源代码、数据库、截图、参考文献）转成可追溯、可续写、可评审的本科毕业论文，遵循学校模板与范文风格。非常适合中文毕设；并非通用学术写作工具。
