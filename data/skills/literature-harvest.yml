name: literature-harvest
slug: literature-harvest
source_url: https://github.com/zhongzhx/literature-harvest
author: zhongzhx
author_url: https://github.com/zhongzhx
license: MIT
category: Literature Search & Discovery
lifecycle_stage: discovery
type: skill
description: 'Bulk keyword-driven literature harvesting across PubMed, Europe PMC,
  Crossref and OpenAlex: builds a candidate table, downloads legally-accessible full-text
  PDFs with an HTML-to-PDF second pass, and dedups.'
description_zh: 跨 PubMed、Europe PMC、Crossref 和 OpenAlex 的关键词批量文献采集：构建候选清单，下载合法可获取的全文
  PDF（并以 HTML 转 PDF 作为兜底补充），并做去重。适合可复现的语料库构建。
security:
  makes_network_calls: true
  network_endpoints:
  - api.crossref.org
  - api.openalex.org
  - doi.org
  - europepmc.org
  - eutils.ncbi.nlm.nih.gov
  - pmc.ncbi.nlm.nih.gov
  - pubmed.ncbi.nlm.nih.gov
  - www.ebi.ac.uk
  has_hooks: false
  requires_bypass_permissions: false
  telemetry: false
  auto_update: false
  depends_3rdparty: false
  allowed_tools_scoped: true
validate_claim: Ask Claude to use this skill to find recent papers on a specific topic,
  then verify every returned title/DOI resolves to a real paper.
subcategory: Full-text acquisition
