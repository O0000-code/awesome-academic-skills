description: 'A 27-skill scientific-writing suite: literature review, citation management,
  peer review, figures, posters, slides and manuscript drafting. The most popular
  here and broad, but jack-of-all-trades; ships an unscoped Bash.'
description_zh: 一个包含 27 个 skill 的科学写作 skill 集：文献综述、引用管理、同行评审、图表、海报、幻灯片以及稿件起草。是此处最受欢迎、覆盖面最广的一个，但样样通而无一精；且附带了一个未限定权限范围的
  Bash。
