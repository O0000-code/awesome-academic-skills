description: 'KBase AI co-scientist over the BER microbial-ecology data lakehouse:
  16 skills plus reusable patterns for pangenomics, fitness, metagenomics and biochemistry.
  Strong for KBase research; large executable surface and AGPL, so read before trusting.'
description_zh: 架设在 BER 微生物生态数据湖仓之上的 KBase AI 协作科学家：16 个 skill 外加用于泛基因组学、适应度、宏基因组学与生物化学的可复用范式。对
  KBase 研究很强；可执行面较大且采用 AGPL，信任前请先通读。
