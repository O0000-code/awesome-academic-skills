description: 'Genomics suite: searches ENCODE, cross-references 14 databases (GWAS,
  ClinVar, GTEx, JASPAR), runs 7 pipelines, and writes provenance-tracked methods.
  Heavily tested; AGPL and genomics-specific, so niche elsewhere.'
description_zh: 基因组学套件：检索 ENCODE，交叉比对 14 个数据库（GWAS、ClinVar、GTEx、JASPAR），运行 7 条 pipeline，并撰写带
  provenance 追踪的 methods。测试充分；AGPL 且专攻基因组学，在其他领域较为小众。
