description: 'Modular all-in-one research suite (47 skills): literature search, reference
  management, PDF parsing and writing support, built to compose. A reasonable general
  backbone of moderate depth; note it ships an SSH-backup feature and a hook to review.'
description_zh: 模块化的一体式研究套件（47 个技能）：文献检索、引用管理、PDF 解析与写作支持，设计上可自由组合。是一套深度中等、尚算合理的通用骨架；注意它附带一个
  SSH 备份功能和一个需要审查的 hook。
