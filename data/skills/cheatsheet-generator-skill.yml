description: Turns course slides and PDFs into dense, exam-ready LaTeX cheatsheets.
  Narrow and student-focused (study/teaching rather than original research), but well-targeted
  and popular; good for condensing course material, not for literature work.
description_zh: 把课程幻灯片与 PDF 转成信息密集、可直接应考的 LaTeX 速查表。定位窄、面向学生（偏学习/教学而非原创研究），但切中需求且受欢迎；适合浓缩课程材料，不适合文献工作。
