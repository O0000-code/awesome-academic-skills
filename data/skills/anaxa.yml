name: anaxa
slug: anaxa
source_url: https://github.com/citrus-bit/anaxa
author: citrus-bit
author_url: https://github.com/citrus-bit
license: MIT
category: Autonomous Research Systems
lifecycle_stage: autonomous
type: suite
description: 'Auditable, pausable research-agent workbench: drives a topic through
  lit search, evidence binding, sandboxed experiments, draft and citation audit to
  a LaTeX/PDF bundle with human gates. Heavy full-stack app, not a drop-in skill.'
description_zh: 可审计、可暂停的研究 agent 工作台：把一个选题依次推过文献检索、证据绑定、沙箱实验、初稿与引用审计，最终产出带人工闸门的 LaTeX/PDF
  成品包。是重型全栈应用，而非即插即用的 skill。
