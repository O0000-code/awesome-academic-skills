description: 'Anti-hallucination mode applying Anthropic''s three guardrails: admit uncertainty, quote-before-analyze,
  cite-every-claim with a self-audit and public retraction. Trades creativity for trust; a fact-grounding
  overlay, not a general research mode.'
description_zh: 反幻觉研究模式，落实 Anthropic 的三条护栏：承认不确定、先引用后分析、每条论断都给出引用，并配以自我审计与公开更正。以创造力换取可信度；它是一层事实校准的叠加层，而非通用的
  research 模式。
