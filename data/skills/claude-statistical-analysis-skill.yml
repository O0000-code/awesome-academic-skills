description: Statistical-consultant skill that diagnoses assumptions first, auto-selects
  methods (t-test to SEM/HLM/IRT/meta-analysis) and emits an APA-7 table, 300dpi figure
  and results paragraph. Assumption-first is its edge; advanced methods need the R
  Docker.
