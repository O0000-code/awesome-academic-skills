description: 'End-to-end Chinese-student paper workflow over 8 free sources (S2, arXiv,
  Crossref, PubMed, CNKI, Wanfang, Baidu/Google Scholar): search, review, polish,
  plagiarism precheck, AI-rate reduction, GB/T-7714 refs. Broad but shallow per stage.'
description_zh: 面向中国学生、覆盖 8 个免费来源（S2、arXiv、Crossref、PubMed、CNKI、万方、百度/Google Scholar）的端到端论文工作流：检索、综述、润色、查重预检、降
  AI 率、GB/T 7714 参考文献。覆盖广，但每个环节都偏浅。
