description: Nine-agent pipeline taking clinical data to a submission-ready medical
  manuscript — requirement scoping, data profiling, stats, figures, literature, drafting,
  submission packaging. Ambitious end-to-end; some modules are a partial public release.
description_zh: 九个 agent 组成的流水线，把临床数据一路推到可投稿的医学稿件——需求界定、数据画像、统计、绘图、文献、撰写、投稿打包。端到端的野心十足；部分模块只是部分公开发布。
