install: Clone; the skills live under .claude/skills/ (copy into your project or ~/.claude/skills/)
validate_claim: Give it a draft plus a target journal's author-guidelines URL/PDF;
  confirm it emits a reordered, reference-restyled .docx whose body text/results are
  byte-for-byte unchanged from the input.
