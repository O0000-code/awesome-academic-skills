description: Reformats a finished manuscript to a new journal's author guidelines
  for post-rejection resubmission, never touching the results.
description_zh: 为被拒后改投，把已完稿论文按新期刊作者须知重新排版，全程不动结果。
description_long: 'Solves the post-rejection chore: reformats a finished manuscript
  to a new journal''s author guidelines — section order, citation style, missing declarations,
  word limits — into a submission-ready Word file, never touching data, results or
  conclusions.'
description_zh_long: 专治被拒后改投的杂活：把已完稿的论文按新期刊的作者须知重新排版——章节顺序、引用格式、缺失的声明、字数限制——产出一份可直接投稿的
  Word 文件，全程不动数据、结果与结论。
