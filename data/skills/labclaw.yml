description: Large lab-science skill library (240 SKILL.md across biology, pharma,
  medicine, literature, vision) wrapping real tools — ESM, AlphaFold DB, biopython,
  single-cell stacks — for dry-lab reasoning and protocol composition.
description_zh: 大型实验科学技能库（240 个 SKILL.md，覆盖生物、制药、医学、文献、影像），封装了真实工具：ESM、AlphaFold DB、biopython、单细胞工具栈，用于干实验推理与实验方案编排。
