description: Generates BibTeX from a DOI, PMID, arXiv ID, or paper title by querying
  CrossRef, PubMed, arXiv, Semantic Scholar and ChemRxiv. Mature, tested, PyPI-published;
  the agent skill is a thin wrapper over a solid CLI. LGPL-3.0.
description_zh: 通过查询 CrossRef、PubMed、arXiv、Semantic Scholar 和 ChemRxiv，从 DOI、PMID、arXiv
  ID 或论文标题生成 BibTeX。成熟、经过测试、已发布到 PyPI；该 agent skill 是对一个扎实 CLI 的轻量封装。LGPL-3.0。
