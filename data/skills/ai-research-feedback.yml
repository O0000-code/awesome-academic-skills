description: Pre-submission referee simulator tuned only for AER/QJE/JF-tier economics
  — six parallel agents, not general review.
description_zh: 专为 AER/QJE/JF 量级经济学调校的投稿前审稿人模拟器——六个并行 agent，不适合泛用型审稿。
description_long: 'Economics pre-submission referee simulator: six parallel agents
  (style, claim discipline, math, an adversarial top-5 referee, more) over a LaTeX
  paper, consolidated into a journal-targeted report. Tuned for AER/QJE/JF-tier econ,
  not general review.'
description_zh_long: 经济学投稿前的审稿人模拟器：六个并行 agent（文风、论断把关、数学推导、一个对抗式的 top-5 期刊审稿人等）通读
  LaTeX 论文，汇总成一份面向具体期刊的评审报告。专为 AER/QJE/JF 量级的经济学论文调校，不适合泛用型审稿。
