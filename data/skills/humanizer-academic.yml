description: De-slop for medical manuscripts that makes the inverse move — it restores
  formal terms LLMs avoid rather than flattening everything.
description_zh: 面向医学论文的去 AI 味工具，反其道而行——找回 LLM 刻意回避的正式术语，而非把一切抹平。
description_long: De-slop tuned for medical and scientific manuscripts, from Wikipedia's
  "Signs of AI writing". Its differentiator is the inverse move — it preserves legit
  academic transitions and restores formal terms LLMs avoid, rather than flattening
  everything.
description_zh_long: 一款为医学与科学论文调校的去 AI 味工具，源自维基百科"AI 写作特征"。它的差异化在于反向操作——保留合理的学术过渡词、找回
  LLM 刻意回避的正式术语，而不是把一切都抹平。
