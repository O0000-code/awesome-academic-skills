description: Deep-reads a single paper and produces high-quality, structured Obsidian-style
  research notes (claims, methods, takeaways) usable across Claude Code/Codex/Cursor.
  Great for building a notes vault; one-paper-at-a-time, not corpus-scale.
description_zh: 深读单篇论文，产出高质量、结构化的 Obsidian 风格研究笔记（论断、方法、要点），可在 Claude Code/Codex/Cursor
  间通用。很适合搭建笔记库；一次只读一篇，不面向语料级规模。
