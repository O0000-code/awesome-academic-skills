install: Add as a Claude Code plugin (marketplace.json) or copy the `stata` skill
  into ~/.claude/skills/
validate_claim: '"Write a reghdfe two-way fixed-effects regression of wage on a treatment
  dummy with clustered SEs, and guard every inequality filter against missing values."
  Verify the output uses `if !missing(...)` and correct local-macro backtick/quote
  syntax.'
